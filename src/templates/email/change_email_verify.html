<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱变更验证</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
                    <tr>
                        <td style="padding:24px 28px;background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;">
                            <h1 style="margin:0;font-size:22px;line-height:1.4;">智能社团+</h1>
                            <p style="margin:8px 0 0;font-size:14px;opacity:0.92;">邮箱变更验证通知</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px;">
                            <p style="margin:0 0 14px;font-size:15px;line-height:1.8;">你好，{{ user.username }}：</p>
                            <p style="margin:0 0 14px;font-size:15px;line-height:1.8;">我们收到了你在平台提交的邮箱变更请求，目标邮箱为：</p>
                            <p style="margin:0 0 18px;font-size:16px;font-weight:700;color:#0f172a;">{{ new_email }}</p>
                            <p style="margin:0 0 22px;font-size:15px;line-height:1.8;">请点击下方按钮完成验证。验证成功后，账号邮箱才会更新。</p>
                            <p style="margin:0 0 24px;text-align:center;">
                                <a href="{{ verify_url }}" style="display:inline-block;padding:12px 20px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;">验证并更新邮箱</a>
                            </p>
                            <p style="margin:0 0 8px;font-size:13px;line-height:1.8;color:#6b7280;">链接有效期为24小时。如按钮无法点击，请复制下方链接到浏览器打开：</p>
                            <p style="margin:0;word-break:break-all;font-size:12px;line-height:1.7;color:#334155;">{{ verify_url }}</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 28px;background:#f8fafc;border-top:1px solid #e5e7eb;color:#6b7280;font-size:12px;line-height:1.8;">
                            如果这不是你的操作，请忽略本邮件并及时修改账号密码。
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
