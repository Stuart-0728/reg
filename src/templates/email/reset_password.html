<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码重置</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;color:#1f2937;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="padding:24px 28px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;">
              <div style="font-size:22px;font-weight:700;">重庆师范大学智能社团+</div>
              <div style="margin-top:6px;font-size:14px;opacity:.95;">密码重置通知</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px;">
              <p style="margin:0 0 12px 0;font-size:15px;line-height:1.9;color:#4b5563;">你好{% if user and user.username %}，{{ user.username }}{% endif %}：</p>
              <p style="margin:0 0 16px 0;font-size:15px;line-height:1.9;color:#4b5563;">我们收到了你的密码重置请求。请点击下方按钮设置新密码（链接2小时内有效）。</p>

              <p style="margin:20px 0 22px 0;text-align:center;">
                <a href="{{ reset_url }}" style="display:inline-block;padding:12px 22px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none;font-weight:600;">立即重置密码</a>
              </p>

              <p style="margin:0 0 8px 0;font-size:13px;color:#6b7280;line-height:1.8;">如果按钮无法点击，请复制以下链接到浏览器打开：</p>
              <p style="margin:0 0 14px 0;font-size:12px;word-break:break-all;color:#1d4ed8;line-height:1.8;">{{ reset_url }}</p>

              <p style="margin:0;font-size:13px;color:#6b7280;line-height:1.9;">如果这不是你的操作，请忽略此邮件，你的账号仍然安全。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
