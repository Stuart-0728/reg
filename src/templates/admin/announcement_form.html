{% extends 'base.html' %}

{% block title %}{{ title }} - 智能社团+{% endblock %}

{% block content %}
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">管理面板</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('admin.announcements') }}">公告管理</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
        </ol>
    </nav>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-transparent text-dark">
            <h4 class="mb-0">{{ title }}</h4>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data" data-no-loading>
                {{ form.hidden_tag() }}
                <div class="mb-3">
                    <label for="title" class="form-label">公告标题 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title" required 
                           value="{{ announcement.title if announcement else '' }}">
                </div>
                
                <div class="mb-3">
                    <label for="content" class="form-label">公告内容 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="content" name="content" rows="10" required>{{ announcement.content if announcement else '' }}</textarea>
                    <div class="mt-2 d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="insertLinkBtn">插入超链接</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="insertBoldBtn">加粗示例</button>
                    </div>
                    <div class="form-text mt-2">允许标签：&lt;a&gt; &lt;p&gt; &lt;br&gt; &lt;ul&gt; &lt;ol&gt; &lt;li&gt; &lt;strong&gt; &lt;em&gt; &lt;code&gt; &lt;pre&gt; &lt;blockquote&gt;。链接仅支持 http/https/mailto/tel。</div>
                </div>
                
                <div class="mb-3">
                    <label for="status" class="form-label">状态</label>
                    <select class="form-select" id="status" name="status">
                        <option value="draft" {% if announcement and announcement.status == 'draft' %}selected{% endif %}>草稿</option>
                        <option value="published" {% if not announcement or announcement.status == 'published' %}selected{% endif %}>已发布</option>
                        <option value="archived" {% if announcement and announcement.status == 'archived' %}selected{% endif %}>已归档</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('admin.announcements') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>返回
                    </a>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-save me-1"></i><span id="submitText">保存</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const contentInput = document.getElementById('content');
    const insertLinkBtn = document.getElementById('insertLinkBtn');
    const insertBoldBtn = document.getElementById('insertBoldBtn');

    function insertAtCursor(text) {
        if (!contentInput) {
            return;
        }
        const start = contentInput.selectionStart || 0;
        const end = contentInput.selectionEnd || 0;
        const old = contentInput.value || '';
        contentInput.value = old.slice(0, start) + text + old.slice(end);
        const cursor = start + text.length;
        contentInput.focus();
        contentInput.setSelectionRange(cursor, cursor);
    }

    if (insertLinkBtn) {
        insertLinkBtn.addEventListener('click', function() {
            insertAtCursor('<a href="https://example.com" target="_blank">点击查看详情</a>');
        });
    }

    if (insertBoldBtn) {
        insertBoldBtn.addEventListener('click', function() {
            insertAtCursor('<strong>重点提示：</strong>');
        });
    }
    
    if (form && submitBtn) {
        form.addEventListener('submit', function(e) {
            console.log('公告表单正在提交');
            
            // 验证表单
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if (!title || !content) {
                e.preventDefault();
                alert('请填写标题和内容');
                return;
            }
            
            // 显示加载状态
            submitBtn.disabled = true;
            submitText.innerHTML = '保存中...';
            
            console.log('公告表单验证通过，正在提交');
        });
    }
});
</script>

{% endblock %}
