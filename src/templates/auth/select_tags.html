{% extends 'base.html' %}

{% block title %}选择兴趣标签 - 重庆师范大学智能社团+{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-transparent text-dark">
                    <h4 class="mb-0">请选择你的兴趣标签</h4>
                </div>
                <div class="card-body">
                    <form id="tagsForm" method="post" class="no-loading" data-no-loading="true">
                        <!-- 添加CSRF令牌 -->
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="mb-4">
                            <div class="d-flex flex-wrap gap-2">
                                {% for tag in tags %}
                                <input type="checkbox" class="btn-check" name="tags" id="tag{{ tag.id }}" value="{{ tag.id }}" autocomplete="off"
                                    {% if tag.id in selected_tag_ids %}checked{% endif %}>
                                <label class="btn btn-outline-primary tag-btn {% if tag.id in selected_tag_ids %}tag-selected{% endif %}" for="tag{{ tag.id }}">
                                    <span class="tag-check-mark">✓</span>
                                    {{ tag.name }}
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>保存兴趣标签</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.tag-btn {
    border-radius: 999px !important;
    padding: 0.5rem 1.2rem !important;
    font-size: 1rem !important;
    transition: all 0.2s ease !important;
    border-width: 2px !important;
    font-weight: 600;
}
.tag-check-mark {
    display: none;
    margin-right: 0.35rem;
}
.btn-check:checked + .tag-btn {
    background: #2563eb !important;
    color: #fff !important;
    border-color: #2563eb !important;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.32);
    transform: translateY(-1px) scale(1.04);
}
.btn-check:checked + .tag-btn .tag-check-mark {
    display: inline-block;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const checkboxes = document.querySelectorAll('input[name="tags"]');
    const submitBtn = document.getElementById('submitBtn');
    
    function updateSubmitButton() {
        const checked = document.querySelectorAll('input[name="tags"]:checked').length;
        submitBtn.disabled = checked === 0;
    }
    
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const label = document.querySelector(`label[for="${checkbox.id}"]`);
            if (label) {
                label.classList.toggle('tag-selected', checkbox.checked);
            }
            updateSubmitButton();
        });
    });
    
    updateSubmitButton();
});
</script>
{% endblock %}
