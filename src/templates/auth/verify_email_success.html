{% extends 'base.html' %}

{% block title %}邮箱验证成功 - 智能社团+{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-sm success-card">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="mb-3"><i class="fas fa-circle-check text-success" style="font-size:3rem;"></i></div>
                    <h3 class="fw-bold mb-2">{% if already_verified %}邮箱已验证{% else %}邮箱验证成功{% endif %}</h3>
                    <p class="text-muted mb-4">账号 {{ user.username }} {% if already_verified %}此前已完成验证{% else %}现在可以正常登录并使用全部功能{% endif %}。</p>
                    <a href="{{ url_for('auth.login') }}" class="btn btn-success px-4">前往登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.success-card {
    border-radius: 14px;
    background: linear-gradient(180deg, #ffffff 0%, #f7fff9 100%);
}
</style>
{% endblock %}
